repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy

  - repo: local
    hooks:
      - id: no-model-weights
        name: Prevent model weights pushing
        description: As the name suggest it this hook prevent the user from pushing any model weights related files.
        entry: "Poids de modele detecte : ne pas committer de poids (cf .gitignore)."
        language: fail
        files: '\.(pt|bin|safetensors|onnx)$' # https://regex101.com/r/1vJFee/1
